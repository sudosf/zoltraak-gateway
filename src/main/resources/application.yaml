spring:
  application:
    name: "Zoltraak Gateway"
  jackson:
    default-property-inclusion: non_null

server:
  port: 8081
  shutdown: graceful

zoltraak:
  provider:
    active: runpod
    response-timeout-seconds: 30
    id-cache-hours: 3
    vastai:
      base-url: https://console.vast.ai
    runpod:
      base-url: https://rest.runpod.io/v1

  ollama:
    gpu-pod:
      port: 11434
    local:
      url: http://localhost
      port: 11434
      timeout-seconds: 15

  gpu:
    idle-check-timeout-minutes: 10
    idle-check-interval-seconds: 30
    warmup-timeout-minutes: 3
    warmup-poll-interval-seconds: 5
    warmup-poll-initial-delay-seconds: 5
    reconciler-poll-interval-seconds: 60
    reconciler-poll-initial-delay-seconds: 10

  queue:
    max-wait-minutes: 5
    expiry-check-interval-seconds: 30

logging:
  level:
    reactor.netty: WARN