spring:
  application:
    name: "Zoltraak Gateway"
  jackson:
    default-property-inclusion: non_null

server:
  port: 8081
  shutdown: graceful

zoltraak:
  provider:
    active: ${ACTIVE_PROVIDER:runpod}
    response-timeout-seconds: 60
    id-cache-hours: 1
    vastai:
      base-url: https://console.vast.ai
    runpod:
      base-url: https://rest.runpod.io/v1
      create:
        imageName: "runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel-ubuntu22.04"
        interruptible: false
        supportPublicIp: true
        globalNetworking: true
        minVCPUPerGPU: 2
        minRAMPerGPU: 8
        vcpuCount: 2
        minDiskBandwidthMBps: 100
        minDownloadMbps: 100
        minUploadMbps: 100
        volumeInGb: 20
        dataCenterPriority: "availability"
        dataCenterIds: [ ]
        countryCodes: [ ]
  ollama:
    gpu-pod:
      port: 11434
    local:
      url: http://localhost
      port: 11434

  gpu:
    idle-check-timeout-minutes: ${IDLE_CHECK_TIMEOUT_MINUTES:15}
    idle-check-interval-seconds: 30
    warmup-timeout-minutes: 3
    warmup-poll-interval-seconds: 5
    warmup-poll-initial-delay-seconds: 5
    reconciler-poll-interval-seconds: 60
    reconciler-poll-initial-delay-seconds: 10

  queue:
    max-wait-minutes: 5
    expiry-check-interval-seconds: 30

  security:
    api-key: ${GATEWAY_API_KEY}

logging:
  level:
    reactor.netty: WARN