services:
  zoltraak-gateway:
    image: ghcr.io/sudosf/zoltraak-gateway:dev
    container_name: zoltraak-gateway-dev
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - RUNPOD_API_KEY_DEV=${RUNPOD_API_KEY_DEV}
      - VAST_AI_API_KEY_DEV=${VAST_AI_API_KEY_DEV}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
    restart: unless-stopped