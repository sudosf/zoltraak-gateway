services:
  zoltraak-gateway:
    image: ghcr.io/sudosf/zoltraak-gateway:latest
    container_name: zoltraak-gateway
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - VAST_AI_API_KEY=${VAST_AI_API_KEY}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - ACTIVE_PROVIDER=${ACTIVE_PROVIDER}
      - IDLE_CHECK_TIMEOUT_MINUTES=${IDLE_CHECK_TIMEOUT_MINUTES}
      # RunPod Auto-Rental Configuration
      - RUNPOD_CLOUD_TYPE=${RUNPOD_CLOUD_TYPE}
      - RUNPOD_COMPUTE_TYPE=${RUNPOD_COMPUTE_TYPE}
      - RUNPOD_GPU_TYPE_IDS=${RUNPOD_GPU_TYPE_IDS}
      - RUNPOD_GPU_COUNT=${RUNPOD_GPU_COUNT}
      - RUNPOD_GPU_PRIORITY=${RUNPOD_GPU_PRIORITY}
      - RUNPOD_IMAGE_NAME=${RUNPOD_IMAGE_NAME}
      - RUNPOD_NAME=${RUNPOD_NAME}
      - RUNPOD_NETWORK_VOLUME_ID=${RUNPOD_NETWORK_VOLUME_ID}
      - RUNPOD_PORTS=${RUNPOD_PORTS}
      - RUNPOD_VOLUME_MOUNT_PATH=${RUNPOD_VOLUME_MOUNT_PATH}
      - RUNPOD_CONTAINER_DISK_SIZE_GB=${RUNPOD_CONTAINER_DISK_IN_GB}
    restart: unless-stopped
    stop_grace_period: 35s